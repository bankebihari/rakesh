<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="glow1" cx="75%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f0f8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f0f8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0f8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f8ff"/>
      <stop offset="50%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0ea5e9" stroke-width="0.4" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- White-ocean base -->
  <rect width="1440" height="900" fill="url(#base)"/>

  <!-- Light grid -->
  <rect width="1440" height="900" fill="url(#grid)"/>

  <!-- Soft glows -->
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>
  <rect width="1440" height="900" fill="url(#glow3)"/>

  <!-- Soft wave shapes -->
  <g opacity="0.09">
    <ellipse cx="1150" cy="650" rx="650" ry="200" fill="#38bdf8"/>
    <ellipse cx="250" cy="780" rx="500" ry="140" fill="#0ea5e9"/>
    <ellipse cx="720" cy="860" rx="860" ry="100" fill="#0284c7"/>
  </g>

  <!-- Shimmer line -->
  <rect x="0" y="840" width="1440" height="1.5" fill="#38bdf8" opacity="0.18"/>

  <!-- Subtle particles -->
  <g fill="#0284c7" opacity="0.25">
    <circle cx="120" cy="180" r="2"/>
    <circle cx="340" cy="90" r="1.5"/>
    <circle cx="680" cy="140" r="2"/>
    <circle cx="900" cy="60" r="1.5"/>
    <circle cx="1150" cy="200" r="2.5"/>
    <circle cx="1320" cy="110" r="1.5"/>
    <circle cx="200" cy="400" r="1.5"/>
    <circle cx="500" cy="320" r="2"/>
    <circle cx="800" cy="280" r="1.5"/>
    <circle cx="1050" cy="350" r="2"/>
    <circle cx="60" cy="600" r="1.5"/>
    <circle cx="420" cy="540" r="2"/>
    <circle cx="1200" cy="580" r="2.5"/>
  </g>
</svg>
